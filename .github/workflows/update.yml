name: Update lease data

on:
  schedule:
    - cron: "0 14 * * *"   # daily at 14:00 UTC (~9am ET)
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest Tesla lease offers
        run: node scripts/update.mjs
      - name: Commit snapshot if changed
        run: |
          if [[ -n "$(git status --porcelain data/history.json)" ]]; then
            git config user.name "lease-bot"
            git config user.email "lease-bot@users.noreply.github.com"
            git add data/history.json
            git commit -m "data: snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data change today."
          fi
